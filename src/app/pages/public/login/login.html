<section class="login-page">
  <!-- <div class="login-overlay"></div> -->

  <div class="login-content">
    <div class="login-box">
      <div class="login-logo mobile-only">
        <img src="/images/ertragsmacher_logo.png" alt="Logo" />
      </div>

      <div class="login-left">
        <div class="login-form-wrapper">
          <h1>Herzlich Willkommen zum Verkaufswettbewerb</h1>

          <form class="login-form" [formGroup]="loginForm" (ngSubmit)="login()">
            <div class="form-group">
              <!-- <label for="dealernumber">User ID</label> -->
              <input id="dealernumber" type="text" formControlName="dealernumber" placeholder="User ID" />
            </div>

            <div class="form-group">
              <!-- <label for="password">Passwort</label> -->
              <input id="password" type="password" formControlName="password" placeholder="Passwort" />
            </div>

            <button type="submit" class="login-btn" [disabled]="isSubmitting">{{ isSubmitting ? 'Anmelden...' : 'Anmelden' }}</button>

            <a routerLink="/passwort-vergessen" class="forgot-password">
              Passwort vergessen
            </a>

            <a routerLink="/registrieren" class="register-link">
              Jetzt registrieren
            </a>

            @if (errorMessage) {
              <p class="error-message">{{ errorMessage }}</p>
            }
          </form>
        </div>
      </div>

      <div class="login-right desktop-only">
        <div class="login-logo">
          <img src="/images/ertragsmacher_logo.png" alt="Logo" />
        </div>
      </div>
    </div>
  </div>
</section>
