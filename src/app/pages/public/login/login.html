<section class="login-page">
  <!-- <div class="login-overlay"></div> -->

  <div class="login-content">
    <div class="login-box">
      <div class="login-logo mobile-only">
        <img src="/images/ertragsmacher_logo.png" alt="Logo" />
      </div>

      <div class="login-left">
        <div class="login-form-wrapper">
          <h1>Herzlich Willkommen zum Verkaufswettbewerb</h1>

          <form class="login-form">
            <div class="form-group">
              <label for="dealernumber">Händlernummer</label>
              <input id="dealernumber" type="text" placeholder="Händelernummer" />
            </div>
            
            <div class="form-group">
              <label for="email">E-Mail</label>
              <input id="email" type="email" placeholder="E-Mail" />
            </div>

            <div class="form-group">
              <label for="password">Passwort</label>
              <input id="password" type="password" placeholder="Passwort" />
            </div>

            <button type="submit" class="login-btn">Anmelden</button>

            <a routerLink="/passwort-vergessen" class="forgot-password">
              Passwort vergessen
            </a>
          </form>
        </div>
      </div>

      <div class="login-right desktop-only">
        <div class="login-logo">
          <img src="/images/ertragsmacher_logo.png" alt="Logo" />
        </div>
      </div>
    </div>
  </div>
</section>
